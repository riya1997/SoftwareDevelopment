<!doctype html>
<html>
  <head>
    <title>Sign up Form</title>
  </head>
  <body>
    <section>
      <header>
        <h1>Sign up Form</h1>
      </header>
      <form>
        <fieldset>
          <label for="name">Name:</label>
          <input type="text" id="name" name="name" placeholder="Enter your Name" required/><br /><br />
          <label for="email">Email:</label>
          <input type="email" id="email" name="email" placeholder="Enter your Email" required /><br /><br />
          <label for="telephone">Telephone:</label>
          <input type="tel" id="telephone" name="telephone" placeholder="Enter your telephone" required></textarea><br /><br />
          <label for="bootcamp">Choose a Bootcamp:</label>
          <select id="bootcamp" name="bootcamp">
            <option value="softwaredevelopment">Software Development</option>
            <option value="datascience">Data Science</option>
            <option value="ai">AI for Business</option>
          </select>
          <br /><br />
          <label for="mode">Learning Mode:</label>
          <input type="radio" id="online" name="mode" value="online">
          <label for="online">Online</label>
          <input type="radio" id="offline" name="mode" value="offline">
          <label for="offline">Offline</label>
          <br />
          <label for="message">Why do you want to join?</label>
          <textarea id="message" name="message"></textarea><br /><br />
          <button type="submit">Submit</button>
        </fieldset>
      </form>
    </section>
  </body>
</html>
